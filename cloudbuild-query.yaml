# Cloud Build: query-service image (context = repo root)
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/query-service/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/PROJECT/quickpickr/query-service:latest
