# QuickPickr — local / staging stack (API + web + optional Redis)
# Usage:
#   copy .env.example .env   # fill Vertex + GCP
#   docker compose up --build
# Browser: http://localhost:3000  API: http://127.0.0.1:8080

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/query-service/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    # For Vertex inside Docker, use overlay: docker compose -f docker-compose.yml -f docker-compose.gcp.yml up
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Browser runs on host — must reach published API port, not Docker service name
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # One-off indexer (not started by default):
  #   docker compose --profile indexer run --rm indexer --help
  indexer:
    profiles: ["indexer"]
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    env_file:
      - path: .env
        required: false
    # Mount SA via docker-compose.gcp.yml when running indexer with Vertex
