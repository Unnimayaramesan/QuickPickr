openapi: 3.1.0
info:
  title: QuickPickr Query Service
  description: Search quick-commerce prices via Vertex AI Search
  version: 0.2.0
paths:
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/search:
    post:
      summary: Search
      operationId: search_v1_search_post
      parameters:
      - name: X-Session-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Session-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Dev Search Page
      description: Minimal web UI for local Vertex search testing.
      operationId: dev_search_page__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          enum:
          - ok
          - degraded
          - error
          title: Status
        vertexConfigured:
          type: boolean
          title: Vertexconfigured
        credentialsPathSet:
          type: boolean
          title: Credentialspathset
        servingConfig:
          anyOf:
          - type: string
          - type: 'null'
          title: Servingconfig
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
      type: object
      required:
      - status
      - vertexConfigured
      - credentialsPathSet
      title: HealthResponse
    RowStatus:
      type: string
      enum:
      - available
      - unavailable
      - error
      title: RowStatus
    SearchMeta:
      properties:
        cacheHit:
          type: boolean
          title: Cachehit
          default: false
        latencyMs:
          type: integer
          title: Latencyms
          default: 0
        vertexServingConfig:
          anyOf:
          - type: string
          - type: 'null'
          title: Vertexservingconfig
      type: object
      title: SearchMeta
    SearchRequest:
      properties:
        query:
          type: string
          maxLength: 120
          minLength: 2
          title: Query
        pincode:
          type: string
          pattern: ^[1-9][0-9]{5}$
          title: Pincode
      type: object
      required:
      - query
      - pincode
      title: SearchRequest
    SearchResponse:
      properties:
        query:
          type: string
          title: Query
        pincode:
          type: string
          title: Pincode
        searchedAt:
          type: string
          title: Searchedat
        results:
          items:
            $ref: '#/components/schemas/SearchResultRow'
          type: array
          title: Results
        meta:
          $ref: '#/components/schemas/SearchMeta'
      type: object
      required:
      - query
      - pincode
      - searchedAt
      - results
      - meta
      title: SearchResponse
    SearchResultRow:
      properties:
        retailer:
          type: string
          title: Retailer
        retailerDisplayName:
          type: string
          title: Retailerdisplayname
        title:
          type: string
          title: Title
          default: ''
        packSize:
          type: string
          title: Packsize
          default: ''
        imageUrl:
          type: string
          title: Imageurl
          default: ''
        finalPriceInr:
          anyOf:
          - type: number
          - type: 'null'
          title: Finalpriceinr
        unitPriceLabel:
          anyOf:
          - type: string
          - type: 'null'
          title: Unitpricelabel
        matchConfidence:
          type: string
          enum:
          - high
          - low
          title: Matchconfidence
          default: high
        status:
          $ref: '#/components/schemas/RowStatus'
        crawledAt:
          anyOf:
          - type: string
          - type: 'null'
          title: Crawledat
        buyUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Buyurl
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
      type: object
      required:
      - retailer
      - retailerDisplayName
      - status
      title: SearchResultRow
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
